# config.yaml — Ronki closed-loop orchestrator configuration
# Read by closed_loop.py at startup.  No thresholds are hardcoded in code.

alertmanager_url: "http://localhost:9093"
prometheus_url:   "http://localhost:9090"
poll_interval_seconds: 15
runbook_timeout_seconds: 30

# Baseline JSON path, relative to this config file
baseline_path: "../data-pack/data/baseline.json"

# ── Decision map: alertname → runbook script ──────────────────────────────────
# Option A — Rule-based (deterministic, zero-latency, no API key required).
# Each alertname maps 1-to-1 to a verified runbook.
runbook_map:
  HighLatency:      "runbooks/restart_service.sh"
  HighErrorRate:    "runbooks/clear_cache.sh"
  InstanceDown:     "runbooks/restart_service.sh"
  # Stress test #6: uncomment below to test hallucination defence
  # TestHallucination: "runbooks/nonexistent_runbook.sh"

# ── Rollback map: alertname → rollback script ─────────────────────────────────
# Used when verify fails after the primary action.
# Defaults to the same script as the primary action if not specified.
rollback_map:
  HighLatency:      "runbooks/restart_service.sh"
  HighErrorRate:    "runbooks/restart_service.sh"
  InstanceDown:     "runbooks/restart_service.sh"

# ── Runbook registry (whitelist) ──────────────────────────────────────────────
# ONLY scripts listed here will ever be executed.
# Decision validation (Stress #3) rejects any runbook NOT in this list.
runbook_registry:
  - "runbooks/restart_service.sh"
  - "runbooks/clear_cache.sh"
  - "runbooks/scale_replicas.sh"
  - "runbooks/multi_step_deploy.sh"

# ── Multi-step transactional deploy (Stress #1 / Acceptance test #4) ─────────
# Leave empty to use standard single-runbook flow.
# Uncomment the MultiStepDeploy block to test transactional rollback.
#
# multi_step_map:
#   MultiStepDeploy:
#     - "runbooks/multi_step_deploy.sh --step-a"
#     - "runbooks/multi_step_deploy.sh --step-b"
#     - "runbooks/multi_step_deploy.sh --step-c"
#
# multi_step_rollback_map:
#   MultiStepDeploy:
#     - "runbooks/multi_step_deploy.sh --rollback-a"
#     - "runbooks/multi_step_deploy.sh --rollback-b"
#     - "runbooks/multi_step_deploy.sh --rollback-c"

# ── Blast-radius limits ───────────────────────────────────────────────────────
blast_radius:
  # Maximum total actions fired across ALL services within any 60-second window.
  # Rationale: 5 services, cascade failure scenario → allow up to 3 concurrent
  # remediations per minute to avoid thundering herd on shared DB/infra.
  max_actions_per_minute: 3

  # Maximum restart actions per individual service per hour.
  # Rationale: >5 restarts/hour on one service = non-self-healing failure
  # (OOM, bad config, dependency down).  Halt and escalate instead.
  max_restarts_per_service_per_hour: 5

# ── Circuit breaker ───────────────────────────────────────────────────────────
circuit_breaker:
  # Open circuit after this many consecutive verify failures (across all services).
  consecutive_failure_threshold: 3

  # reset_mode: "manual" — restart the orchestrator process to reset.
  # Rationale: automatic reset risks re-entering a failure loop.  A human
  # must confirm root cause is resolved before automation resumes.
  reset_mode: manual
