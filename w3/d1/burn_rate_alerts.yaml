          tier: "1"
          service: frontend
        annotations:
          summary: "Frontend SLO Tier-1 burn rate ≥ 14.4 (both 1h + 5m windows)"
          description: >
            Frontend is burning SLO budget at ≥ 14.4× baseline.
            Budget (51 840 allowed failures/month) exhausting rapidly.
          runbook: "https://runbooks.example.com/frontend-slo-tier1"

      # Tier 2 — PAGE
      - alert: frontend_burn_rate_tier2
        expr: |
          (
            sum(rate(frontend_page_views_total{js_error="true"}[6h]))
            / sum(rate(frontend_page_views_total[6h]))
          ) / (1 - 0.99) >= 6
          AND
          (
            sum(rate(frontend_page_views_total{js_error="true"}[30m]))
            / sum(rate(frontend_page_views_total[30m]))
          ) / (1 - 0.99) >= 6
        labels:
          severity: page
          tier: "2"
          service: frontend
        annotations:
          summary: "Frontend SLO Tier-2 burn rate ≥ 6 (both 6h + 30m windows)"
          runbook: "https://runbooks.example.com/frontend-slo-tier2"

      # Tier 3 — TICKET
      - alert: frontend_burn_rate_tier3
        expr: |
          (
            sum(rate(frontend_page_views_total{js_error="true"}[3d]))
            / sum(rate(frontend_page_views_total[3d]))
          ) / (1 - 0.99) >= 1
          AND
          (
            sum(rate(frontend_page_views_total{js_error="true"}[6h]))
            / sum(rate(frontend_page_views_total[6h]))
          ) / (1 - 0.99) >= 1
        labels:
          severity: ticket
          tier: "3"
          service: frontend
        annotations:
          summary: "Frontend SLO Tier-3 slow burn (both 3d + 6h windows)"
          runbook: "https://runbooks.example.com/frontend-slo-tier3"
