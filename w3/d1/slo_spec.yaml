version: 1
services:

  # ─────────────────────────────────────────────────────────────────────────────
  # 1. API — request-response service (FastAPI, 4 instances)
  #    Baseline: 691 260 req/day, fail_rate 0.35%, latency p99 = 156 ms
  # ─────────────────────────────────────────────────────────────────────────────
  - name: api
    sli:
      name: api_availability
      kind: availability
      formula: >
        count(status NOT IN {5xx, 429} AND latency_ms < 500) / count(all_requests)
      promql_good: >
        sum(rate(http_requests_total{status!~"5..|429"}[1m]))
      promql_total: >
        sum(rate(http_requests_total[1m]))
      source: data/access_log.jsonl

    slo:
      target: 0.999          # 99.9% — 3 nines
      window_days: 30

    budget:
      # total_events_per_month = 691 260 req/day × 30 days = 20 737 800
      total_events_per_month: 20737800
      # allowed_failures = (1 - 0.999) × 20 737 800 = 0.001 × 20 737 800 = 20 738
      allowed_failures_per_month: 20738
      # req/min at peak ≈ 15 req/s × 60 = 900 req/min
      # downtime_minutes = allowed_failures / 900 ≈ 23 minutes
      downtime_minutes_equivalent: 23

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. DB — storage/query service (Postgres primary + replica)
  #    Baseline: 57 546 queries/day, fail_rate 0.015%, duration p99 = 59 ms
  # ─────────────────────────────────────────────────────────────────────────────
  - name: db
    sli:
      name: db_query_success
      kind: latency
      formula: >
        count(success = true AND duration_ms < 100) / count(all_queries)
      promql_good: >
        sum(rate(db_queries_total{success="true",duration_le="100"}[1m]))
      promql_total: >
        sum(rate(db_queries_total[1m]))
      source: data/db_query_log.jsonl

    slo:
      target: 0.9995         # 99.95% — 3.5 nines
      window_days: 30

    budget:
      # total_events_per_month = 57 546 × 30 = 1 726 380
      total_events_per_month: 1726380
      # allowed_failures = (1 - 0.9995) × 1 726 380 = 0.0005 × 1 726 380 = 863
      allowed_failures_per_month: 863
      # queries/min ≈ 57 546 / 1440 ≈ 40 qpm
      # downtime_minutes = 863 / 40 ≈ 22 minutes
      downtime_minutes_equivalent: 22

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Frontend — CDN SPA, measured via RUM
  #    Baseline: 172 800 page views/day, fail_rate 1.39%, dom_ready p99 = 1430 ms
  # ─────────────────────────────────────────────────────────────────────────────
  - name: frontend
    sli:
      name: frontend_page_load_ok
      kind: availability
      formula: >
        count(dom_ready_ms < 3000 AND js_error = false AND network_error = false) / count(all_page_views)
      promql_good: >
        sum(rate(frontend_page_views_total{js_error="false",network_error="false",dom_le="3000"}[1m]))
      promql_total: >
        sum(rate(frontend_page_views_total[1m]))
      source: data/frontend_rum.jsonl

    slo:
      target: 0.99           # 99.0% — 2 nines (CDN layer tolerates higher variance)
      window_days: 30

    budget:
      # total_events_per_month = 172 800 × 30 = 5 184 000
      total_events_per_month: 5184000
      # allowed_failures = (1 - 0.99) × 5 184 000 = 0.01 × 5 184 000 = 51 840
      allowed_failures_per_month: 51840
      # page views/min ≈ 172 800 / 1440 = 120 ppm
      # downtime_minutes = 51 840 / 120 = 432 minutes
      downtime_minutes_equivalent: 432
